name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build + verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Selvra-paket P0: alla gates blockerar mergen — inget tyst drift av
      # lint-skuld eller test-failures genom till main. tsc körs implicit
      # av `next build` (Next 16 type-checks); separat npx tsc-steg lämnas
      # till framtida utvidgning om vi vill snabbare error-feedback.
      - name: Lint (0 warnings tolererade)
        run: npm run lint -- --max-warnings 0

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
